<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/menu.css">
    <link rel="stylesheet" href="styles/drinkBtn.css">
</head>
<body>

    <button id="btn-close">×</button>

    <main id="main">
      <article class="wrap-slip">
        <section class="slip top-slip">
          <header>
            <h2 class="slip-title">✦ ORDER SLIP ✦</h2>
          </header>
          
          <hr class="slip-line">
          
          <dl class="slip-details">
            <div class="slip-row">
              <dt>Item:</dt>
              <dd class="value">itemname</dd>
            </div>
            <div class="slip-row">
              <dt>Focus:</dt>
              <dd class="value">10 min</dd>
            </div>
          </dl>
          <footer class="rec-dots" aria-hidden="true">. . . . . . . . .</footer>
        </section>

        <figure class="tear-line">
          <figcaption class="tear-label">✂ TEAR HERE ✂</figcaption>
        </figure>

      </article>
    </main>

    <script src="renderer.js"></script>
</body>
</html>
